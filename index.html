<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cobra MK3 - Дрейф в астероидах</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        #ui {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            pointer-events: none;
            color: #0f0;
            font-size: 12px;
            text-shadow: 0 0 2px black;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }
        #controls-hint {
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 10px;
            pointer-events: none;
        }
        #speed-indicator {
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 8px;
            font-family: monospace;
        }
        @media (max-width: 600px) {
            #ui { font-size: 8px; padding: 0 10px; bottom: 10px; }
            #controls-hint, #speed-indicator { padding: 3px 6px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="controls-hint">
            🎮 НАКЛОН ТЕЛЕФОНА | ⬅️ СЛАЙДЕР СКОРОСТИ
        </div>
        <div id="speed-indicator">
            СКОРОСТЬ: <span id="speed-value">0</span>
        </div>
    </div>

    <script>
        (function() {
            // ======================== НАСТРОЙКИ ========================
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            document.body.appendChild(canvas);
            
            let width = window.innerWidth;
            let height = window.innerHeight;
            
            // ======================== ЗВЕЗДНЫЙ ФОН ========================
            const stars = [];
            for (let i = 0; i < 300; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * 2000,
                    y: (Math.random() - 0.5) * 2000,
                    z: (Math.random() - 0.5) * 1500,
                    size: Math.random() * 2 + 1,
                    initialZ: (Math.random() - 0.5) * 1500
                });
            }
            
            // ======================== КОРАБЛЬ COBRA MK3 ========================
            const vertices = [
                { x: -0.5, y:  0.5, z:  1.0 }, // 0
                { x:  0.5, y:  0.5, z:  1.0 }, // 1
                { x:  0.0, y:  0.3, z:  1.2 }, // 2
                { x: -0.6, y:  0.2, z:  0.0 }, // 3
                { x:  0.6, y:  0.2, z:  0.0 }, // 4
                { x:  0.0, y: -0.2, z:  0.0 }, // 5
                { x: -0.4, y:  0.1, z: -0.8 }, // 6
                { x:  0.4, y:  0.1, z: -0.8 }, // 7
                { x:  0.0, y: -0.1, z: -0.9 }  // 8
            ];
            
            const edges = [
                [0,1], [0,2], [1,2],   // нос
                [0,3], [1,4],          // борта
                [3,4],                 // перемычка
                [3,5], [4,5],          // киль
                [3,6], [4,7],          // корма
                [5,8],                 // центр к соплу
                [6,7], [6,8], [7,8]    // двигатели
            ];
            
            // ======================== СТАНЦИЯ (КУБ С БУКВОЙ T) ========================
            const stationVertices = [
                // Углы куба 2x2x2
                { x: -1.2, y: -1.2, z:  1.0 }, // 0 передний левый нижний
                { x:  1.2, y: -1.2, z:  1.0 }, // 1 передний правый нижний
                { x:  1.2, y:  1.2, z:  1.0 }, // 2 передний правый верхний
                { x: -1.2, y:  1.2, z:  1.0 }, // 3 передний левый верхний
                { x: -1.2, y: -1.2, z: -1.0 }, // 4 задний левый нижний
                { x:  1.2, y: -1.2, z: -1.0 }, // 5 задний правый нижний
                { x:  1.2, y:  1.2, z: -1.0 }, // 6 задний правый верхний
                { x: -1.2, y:  1.2, z: -1.0 }, // 7 задний левый верхний
                // Буква T на передней грани
                { x: -0.7, y:  0.3, z:  1.01 }, // 8 левый верх горизонтали
                { x:  0.7, y:  0.3, z:  1.01 }, // 9 правый верх горизонтали
                { x:  0.0, y:  0.3, z:  1.01 }, // 10 центр горизонтали
                { x:  0.0, y: -0.7, z:  1.01 }  // 11 вертикаль
            ];
            
            const stationEdges = [
                [0,1], [1,2], [2,3], [3,0], // передняя грань
                [4,5], [5,6], [6,7], [7,4], // задняя грань
                [0,4], [1,5], [2,6], [3,7], // рёбра соединения
                [8,10], [9,10], [10,11]     // буква T
            ];
            
            // ======================== АСТЕРОИДЫ ========================
            class Asteroid {
                constructor() {
                    this.respawn();
                }
                
                respawn() {
                    // Случайная позиция в полусфере впереди и по бокам
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 12 + Math.random() * 15;
                    this.x = Math.cos(angle) * radius * (Math.random() - 0.5) * 1.5;
                    this.y = (Math.random() - 0.5) * 10;
                    this.z = 8 + Math.random() * 20;
                    // Случайный размер (0.5 до 2.0)
                    this.size = 0.6 + Math.random() * 1.4;
                    // Случайная форма (количество вершин)
                    this.vertices = this.generateAsteroidVertices();
                    this.edges = this.generateAsteroidEdges();
                }
                
                generateAsteroidVertices() {
                    const verts = [];
                    const segments = 12; // 12 вершин для неправильной формы
                    for (let i = 0; i < segments; i++) {
                        const angle1 = (i / segments) * Math.PI * 2;
                        const angle2 = Math.random() * Math.PI * 2;
                        const rad = this.size * (0.7 + Math.random() * 0.6);
                        const x = Math.cos(angle1) * Math.cos(angle2) * rad;
                        const y = Math.sin(angle1) * Math.cos(angle2) * rad;
                        const z = Math.sin(angle2) * rad;
                        verts.push({ x, y, z });
                    }
                    // Добавляем несколько случайных выступов
                    for (let i = 0; i < 6; i++) {
                        verts.push({
                            x: (Math.random() - 0.5) * this.size * 1.3,
                            y: (Math.random() - 0.5) * this.size * 1.3,
                            z: (Math.random() - 0.5) * this.size * 1.3
                        });
                    }
                    return verts;
                }
                
                generateAsteroidEdges() {
                    const edgeSet = new Set();
                    const edgesList = [];
                    // Соединяем вершины в случайном порядке для создания "неровного" вида
                    for (let i = 0; i < this.vertices.length; i++) {
                        for (let j = i + 1; j < this.vertices.length; j++) {
                            const dx = this.vertices[i].x - this.vertices[j].x;
                            const dy = this.vertices[i].y - this.vertices[j].y;
                            const dz = this.vertices[i].z - this.vertices[j].z;
                            const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                            // Соединяем близкие вершины
                            if (dist < this.size * 1.2 && Math.random() < 0.25) {
                                const key = `${i}-${j}`;
                                if (!edgeSet.has(key)) {
                                    edgeSet.add(key);
                                    edgesList.push([i, j]);
                                }
                            }
                        }
                    }
                    // Если слишком мало рёбер, добавляем базовые
                    if (edgesList.length < 8) {
                        for (let i = 0; i < this.vertices.length - 1; i++) {
                            edgesList.push([i, i+1]);
                        }
                        if (this.vertices.length > 2) {
                            edgesList.push([0, this.vertices.length - 1]);
                        }
                    }
                    return edgesList;
                }
            }
            
            // Создаём 3-5 астероидов
            const asteroids = [];
            const asteroidCount = 4;
            for (let i = 0; i < asteroidCount; i++) {
                asteroids.push(new Asteroid());
            }
            
            // ======================== ФИЗИКА УПРАВЛЕНИЯ ========================
            let pitchAngle = 0;           // тангаж (нос вверх/вниз)
            let rollAngle = 0;            // крен (вращение вокруг оси)
            let angularVelocityPitch = 0;
            let angularVelocityRoll = 0;
            let targetPitchRate = 0;
            let targetRollRate = 0;
            
            const GYRO_SENSITIVITY = 0.0035;
            const ANGULAR_ACCEL = 0.035;
            const ANGULAR_FRICTION = 0.96;
            
            let speed = 0;
            let targetSpeed = 0;
            const SPEED_ACCEL = 0.025;
            const MAX_SPEED = 5.5;
            
            let isSpeedControlActive = false;
            
            // Позиция станции (впереди корабля)
            let stationX = 0;
            let stationY = 0;
            let stationZ = 18;
            
            // Прицельная точка (центр экрана)
            let aimX = 0;
            let aimY = 0;
            
            // ======================== ФУНКЦИИ ПОВОРОТА ========================
            function rotateX(v, angle) {
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);
                return {
                    x: v.x,
                    y: v.y * cos - v.z * sin,
                    z: v.y * sin + v.z * cos
                };
            }
            
            function rotateZ(v, angle) {
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);
                return {
                    x: v.x * cos - v.y * sin,
                    y: v.x * sin + v.y * cos,
                    z: v.z
                };
            }
            
            function project3DTo2D(v, w, h) {
                const scale = 320;
                const distance = 5;
                const z = v.z + distance;
                if (z <= 0.1) return { x: w/2, y: h/2, clipped: true };
                const x2d = (v.x * scale) / z + w / 2;
                const y2d = (v.y * scale) / z + h / 2;
                return { x: x2d, y: y2d, clipped: false };
            }
            
            // ======================== ГИРОСКОП ========================
            function handleOrientation(event) {
                let beta = event.beta || 0;
                let gamma = event.gamma || 0;
                
                beta = Math.min(45, Math.max(-45, beta)) / 40;
                gamma = Math.min(45, Math.max(-45, gamma)) / 40;
                
                targetPitchRate = beta * GYRO_SENSITIVITY;
                targetRollRate = gamma * GYRO_SENSITIVITY;
            }
            
            function enableGyroscope() {
                if (typeof DeviceOrientationEvent !== 'undefined' && 
                    typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(response => {
                            if (response === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                                console.log('Гироскоп активирован');
                            }
                        })
                        .catch(err => console.log('Ошибка гироскопа:', err));
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                    console.log('Гироскоп работает (Android)');
                }
            }
            
            // ======================== УПРАВЛЕНИЕ СКОРОСТЬЮ (СЛАЙДЕР) ========================
            function updateSpeed(y) {
                let normY = 1 - (y / height);
                targetSpeed = Math.min(MAX_SPEED, Math.max(0, normY * MAX_SPEED));
                document.getElementById('speed-value').innerText = targetSpeed.toFixed(1);
            }
            
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const x = touch.clientX;
                
                if (x < width / 2) {
                    isSpeedControlActive = true;
                    updateSpeed(touch.clientY);
                }
            });
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (isSpeedControlActive) {
                    updateSpeed(e.touches[0].clientY);
                }
            });
            
            canvas.addEventListener('touchend', () => {
                isSpeedControlActive = false;
            });
            
            canvas.addEventListener('touchstart', enableGyroscope, { once: true });
            
            // ======================== ПРОВЕРКА СТОЛКНОВЕНИЙ ========================
            function checkCollisions(projectedShip, projectedAsteroids) {
                // Простая проверка: если астероид занимает большую площадь экрана и близко к центру
                // Имитация столкновения для простоты
                const centerX = width / 2;
                const centerY = height / 2;
                
                for (let ast of projectedAsteroids) {
                    if (!ast.proj) continue;
                    const dx = ast.proj.x - centerX;
                    const dy = ast.proj.y - centerY;
                    const distToCenter = Math.sqrt(dx*dx + dy*dy);
                    // Если астероид близко к центру и его проекция большая (близко)
                    if (distToCenter < 40 && ast.size > 0.8 && Math.abs(ast.worldZ) < 3) {
                        // Столкновение!
                        return true;
                    }
                }
                return false;
            }
            
            // ======================== ГЛАВНЫЙ ЦИКЛ РИСОВАНИЯ ========================
            let lastCollisionTime = 0;
            let collisionFlash = 0;
            let gameActive = true;
            
            function draw() {
                if (!canvas || !ctx) return;
                
                // Обновляем размеры
                if (width !== window.innerWidth || height !== window.innerHeight) {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;
                    aimX = width / 2;
                    aimY = height / 2;
                }
                
                // ФИЗИКА углов
                if (Math.abs(targetPitchRate) > 0.005) {
                    angularVelocityPitch += targetPitchRate * ANGULAR_ACCEL;
                    angularVelocityPitch = Math.min(0.1, Math.max(-0.1, angularVelocityPitch));
                } else {
                    angularVelocityPitch *= ANGULAR_FRICTION;
                }
                
                if (Math.abs(targetRollRate) > 0.005) {
                    angularVelocityRoll += targetRollRate * ANGULAR_ACCEL;
                    angularVelocityRoll = Math.min(0.1, Math.max(-0.1, angularVelocityRoll));
                } else {
                    angularVelocityRoll *= ANGULAR_FRICTION;
                }
                
                pitchAngle += angularVelocityPitch;
                rollAngle += angularVelocityRoll;
                
                // Обновляем скорость
                speed += (targetSpeed - speed) * SPEED_ACCEL;
                
                // Движение станции относительно скорости
                stationZ -= speed * 0.045;
                if (stationZ < 2.5) stationZ = 2.5;
                if (stationZ > 30) stationZ = 30;
                
                // Движение астероидов
                for (let ast of asteroids) {
                    ast.z -= speed * 0.045;
                    if (ast.z < -5) {
                        ast.respawn();
                        ast.z = 18 + Math.random() * 12;
                    }
                }
                
                // ОЧИСТКА
                ctx.fillStyle = collisionFlash > 0 ? 'rgba(255,0,0,0.3)' : 'black';
                ctx.fillRect(0, 0, width, height);
                if (collisionFlash > 0) collisionFlash -= 0.05;
                
                // ЗВЁЗДЫ
                ctx.fillStyle = 'white';
                for (let star of stars) {
                    let speedEffect = 1 + speed * 2.2;
                    let z = star.z + speedEffect;
                    if (z > 600) z = -600;
                    star.z = z;
                    
                    const scale = 280;
                    const distance = 450;
                    const x2d = (star.x * scale) / (z + distance) + width / 2;
                    const y2d = (star.y * scale) / (z + distance) + height / 2;
                    
                    if (x2d > -50 && x2d < width + 50 && y2d > -50 && y2d < height + 50) {
                        ctx.beginPath();
                        ctx.arc(x2d, y2d, star.size * (0.8 + speed * 0.1), 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                
                // ПОВОРОТ ВЕРШИН КОРАБЛЯ
                const rotatedShip = vertices.map(v => {
                    let r = rotateZ(v, rollAngle);
                    r = rotateX(r, pitchAngle);
                    return r;
                });
                const projectedShip = rotatedShip.map(v => project3DTo2D(v, width, height));
                
                // РИСУЕМ КОРАБЛЬ (зелёный)
                ctx.beginPath();
                ctx.strokeStyle = '#0f0';
                ctx.lineWidth = 2.5;
                for (let edge of edges) {
                    const p1 = projectedShip[edge[0]];
                    const p2 = projectedShip[edge[1]];
                    if (p1 && p2 && !p1.clipped && !p2.clipped) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
                
                // ДВИГАТЕЛИ (мигающие)
                if (projectedShip[6] && projectedShip[7]) {
                    ctx.fillStyle = `hsl(0, 100%, ${50 + Math.sin(Date.now() * 0.015) * 30}%)`;
                    ctx.beginPath();
                    ctx.arc(projectedShip[6].x, projectedShip[6].y, 5, 0, Math.PI * 2);
                    ctx.arc(projectedShip[7].x, projectedShip[7].y, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // СТАНЦИЯ
                const rotatedStation = stationVertices.map(v => {
                    let r = rotateZ(v, rollAngle);
                    r = rotateX(r, pitchAngle);
                    return { x: r.x + stationX, y: r.y + stationY, z: r.z + stationZ };
                });
                const stationProj = rotatedStation.map(v => project3DTo2D(v, width, height));
                
                ctx.beginPath();
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 2;
                for (let edge of stationEdges) {
                    const p1 = stationProj[edge[0]];
                    const p2 = stationProj[edge[1]];
                    if (p1 && p2 && !p1.clipped && !p2.clipped) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
                
                // Маяк станции
                if (stationProj[0]) {
                    ctx.fillStyle = `hsl(0, 100%, ${50 + Math.sin(Date.now() * 0.02) * 30}%)`;
                    ctx.beginPath();
                    ctx.arc(stationProj[0].x, stationProj[0].y, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // АСТЕРОИДЫ
                const asteroidProjections = [];
                for (let ast of asteroids) {
                    const rotatedAsteroid = ast.vertices.map(v => {
                        let r = rotateZ(v, rollAngle);
                        r = rotateX(r, pitchAngle);
                        return { x: r.x + ast.x, y: r.y + ast.y, z: r.z + ast.z };
                    });
                    const astProj = rotatedAsteroid.map(v => project3DTo2D(v, width, height));
                    asteroidProjections.push({ proj: astProj[0], size: ast.size, worldZ: ast.z });
                    
                    ctx.beginPath();
                    ctx.strokeStyle = '#aa8866';
                    ctx.lineWidth = 1.8;
                    for (let edge of ast.edges) {
                        const p1 = astProj[edge[0]];
                        const p2 = astProj[edge[1]];
                        if (p1 && p2 && !p1.clipped && !p2.clipped) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                }
                
                // ПРОВЕРКА СТОЛКНОВЕНИЙ
                const collision = checkCollisions(projectedShip, asteroidProjections);
                if (collision && Date.now() - lastCollisionTime > 800) {
                    lastCollisionTime = Date.now();
                    collisionFlash = 1.0;
                    speed = Math.max(0, speed - 2);
                    targetSpeed = Math.min(targetSpeed, speed);
                    console.log("СТОЛКНОВЕНИЕ!");
                }
                
                // ПРИЦЕЛЬНАЯ ТОЧКА (центр экрана)
                ctx.beginPath();
                ctx.strokeStyle = '#ff3333';
                ctx.lineWidth = 1.5;
                const crossSize = 12;
                ctx.moveTo(aimX - crossSize, aimY);
                ctx.lineTo(aimX - crossSize/2, aimY);
                ctx.moveTo(aimX + crossSize/2, aimY);
                ctx.lineTo(aimX + crossSize, aimY);
                ctx.moveTo(aimX, aimY - crossSize);
                ctx.lineTo(aimX, aimY - crossSize/2);
                ctx.moveTo(aimX, aimY + crossSize/2);
                ctx.lineTo(aimX, aimY + crossSize);
                ctx.stroke();
                
                // ДОПОЛНИТЕЛЬНО: маленькая точка в центре
                ctx.fillStyle = '#ff8888';
                ctx.beginPath();
                ctx.arc(aimX, aimY, 2, 0, Math.PI * 2);
                ctx.fill();
                
                // ИНДИКАТОР РАССТОЯНИЯ ДО СТАНЦИИ
                const distanceToStation = Math.sqrt(stationX*stationX + stationY*stationY + stationZ*stationZ);
                ctx.fillStyle = distanceToStation < 4 ? '#ffaa00' : '#0f0';
                ctx.font = 'bold 14px monospace';
                ctx.fillText(`СТАНЦИЯ: ${distanceToStation.toFixed(1)}`, width - 160, 40);
                
                if (distanceToStation < 4) {
                    ctx.fillStyle = '#ffff00';
                    ctx.font = 'bold 16px monospace';
                    ctx.fillText("◆ ГОТОВ К СТЫКОВКЕ ◆", width - 240, 70);
                }
                
                // ИНДИКАТОР СКОРОСТИ (графический)
                const speedPercent = speed / MAX_SPEED;
                const speedBarHeight = height * speedPercent;
                ctx.fillStyle = 'rgba(0, 255, 0, 0.4)';
                ctx.fillRect(8, height - speedBarHeight, 6, speedBarHeight);
                ctx.strokeStyle = '#0f0';
                ctx.strokeRect(8, 0, 6, height);
                
                // ОТОБРАЖЕНИЕ ТЕКУЩЕЙ СКОРОСТИ ЦИФРОЙ
                ctx.fillStyle = '#0f0';
                ctx.font = '10px monospace';
                ctx.fillText(`${speed.toFixed(1)}`, 18, 25);
                
                // ПОДСКАЗКА ПРИ СТАРТЕ
                if (targetSpeed === 0 && speed === 0) {
                    ctx.fillStyle = '#0f0';
                    ctx.font = '10px monospace';
                    ctx.fillText('⬅️ СЛАЙДЕР СКОРОСТИ', 20, 50);
                    ctx.fillText('🔄 НАКЛОН ТЕЛЕФОНА', 20, 70);
                    ctx.fillText('🎯 НАВЕДИ НА СТАНЦИЮ', 20, 90);
                }
                
                requestAnimationFrame(draw);
            }
            
            // ЗАПУСК
            canvas.width = width;
            canvas.height = height;
            aimX = width / 2;
            aimY = height / 2;
            draw();
            
            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                aimX = width / 2;
                aimY = height / 2;
            });
        })();
    </script>
</body>
</html>
