<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cobra MK3 - Управление наклоном</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            font-family: 'Courier New', monospace;
            touch-action: none; /* Отключаем скролл страницы во время игры */
        }
        /* Интерфейс поверх канваса */
        #ui {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            pointer-events: none;
            color: #0f0;
            font-size: 12px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }
        /* Стили для кнопок (Дублирующее управление) */
        .controls-panel {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
            pointer-events: auto; /* Чтобы кнопки нажимались */
        }
        .ctrl-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #0f0;
            color: #0f0;
            font-size: 24px;
            font-weight: bold;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            text-align: center;
            line-height: 66px;
            cursor: pointer;
            user-select: none;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 10px rgba(0,255,0,0.3);
        }
        .ctrl-btn:active {
            background: #0f0;
            color: black;
            transform: scale(0.95);
        }
        .gyro-activator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f0;
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-family: monospace;
            font-size: 18px;
            z-index: 30;
            cursor: pointer;
            box-shadow: 0 0 20px #0f0;
            transition: 0.2s;
            pointer-events: auto;
        }
        .gyro-status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 8px;
            color: #ffaa00;
            font-size: 11px;
            z-index: 30;
            font-family: monospace;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            .ctrl-btn { width: 55px; height: 55px; line-height: 51px; font-size: 20px; }
            .controls-panel { right: 10px; gap: 15px; }
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>⚡ СКОРОСТЬ: <span id="speed-value">0</span></div>
        <div>🎯 СТАНЦИЯ: <span id="distance-value">--</span></div>
    </div>

    <!-- Панель дублирующего управления (Крен) -->
    <div class="controls-panel">
        <div class="ctrl-btn" id="roll-left">◀</div>
        <div class="ctrl-btn" id="roll-right">▶</div>
    </div>

    <button id="enableGyroBtn" class="gyro-activator">🎮 Активировать гироскоп</button>
    <div id="gyroStatus" class="gyro-status">⏳ Гироскоп: Ожидание активации</div>

    <script>
        (function() {
            // ======================== 1. НАСТРОЙКИ ЭКРАНА ========================
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            document.body.appendChild(canvas);
            
            let width = window.innerWidth;
            let height = window.innerHeight;
            
            // ======================== 2. КОСМИЧЕСКИЙ ФОН (ЗВЕЗДЫ) ========================
            const stars = [];
            for (let i = 0; i < 300; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * 2000,
                    y: (Math.random() - 0.5) * 2000,
                    z: (Math.random() - 0.5) * 1500,
                    size: Math.random() * 2 + 1
                });
            }
            
            // ======================== 3. МОДЕЛЬ КОРАБЛЯ COBRA MK3 ========================
            const vertices = [
                { x: -0.5, y:  0.5, z:  1.0 }, { x:  0.5, y:  0.5, z:  1.0 }, { x:  0.0, y:  0.3, z:  1.2 },
                { x: -0.6, y:  0.2, z:  0.0 }, { x:  0.6, y:  0.2, z:  0.0 }, { x:  0.0, y: -0.2, z:  0.0 },
                { x: -0.4, y:  0.1, z: -0.8 }, { x:  0.4, y:  0.1, z: -0.8 }, { x:  0.0, y: -0.1, z: -0.9 }
            ];
            const edges = [
                [0,1], [0,2], [1,2], [0,3], [1,4], [3,4], [3,5], [4,5],
                [3,6], [4,7], [5,8], [6,7], [6,8], [7,8]
            ];
            
            // ======================== 4. СТАНЦИЯ С БУКВОЙ T ========================
            const stationVertices = [
                { x: -1.2, y: -1.2, z:  1.0 }, { x:  1.2, y: -1.2, z:  1.0 }, { x:  1.2, y:  1.2, z:  1.0 }, { x: -1.2, y:  1.2, z:  1.0 },
                { x: -1.2, y: -1.2, z: -1.0 }, { x:  1.2, y: -1.2, z: -1.0 }, { x:  1.2, y:  1.2, z: -1.0 }, { x: -1.2, y:  1.2, z: -1.0 },
                { x: -0.7, y:  0.3, z:  1.01 }, { x:  0.7, y:  0.3, z:  1.01 }, { x:  0.0, y:  0.3, z:  1.01 }, { x:  0.0, y: -0.7, z:  1.01 }
            ];
            const stationEdges = [
                [0,1],[1,2],[2,3],[3,0], [4,5],[5,6],[6,7],[7,4],
                [0,4],[1,5],[2,6],[3,7], [8,10],[9,10],[10,11]
            ];
            
            // ======================== 5. АСТЕРОИДЫ (Рандом) ========================
            class Asteroid {
                constructor() {
                    this.x = (Math.random() - 0.5) * 20;
                    this.y = (Math.random() - 0.5) * 12;
                    this.z = 10 + Math.random() * 20;
                    this.size = 0.6 + Math.random() * 1.2;
                    this.vertices = this.generateVertices();
                    this.edges = this.generateEdges();
                }
                generateVertices() {
                    let verts = [];
                    for (let i = 0; i < 14; i++) {
                        verts.push({
                            x: (Math.random() - 0.5) * this.size * 1.4,
                            y: (Math.random() - 0.5) * this.size * 1.4,
                            z: (Math.random() - 0.5) * this.size * 1.4
                        });
                    }
                    return verts;
                }
                generateEdges() {
                    let edgeList = [];
                    for (let i = 0; i < this.vertices.length; i++) {
                        for (let j = i+1; j < this.vertices.length; j++) {
                            if (Math.random() < 0.25) edgeList.push([i, j]);
                        }
                    }
                    return edgeList;
                }
            }
            let asteroids = [new Asteroid(), new Asteroid(), new Asteroid()];
            
            // ======================== 6. ФИЗИКА И УПРАВЛЕНИЕ ========================
            let pitchAngle = 0;      // Вверх-вниз (от гироскопа)
            let rollAngle = 0;       // Вращение (от кнопок или гироскопа)
            
            let speed = 0;
            let targetSpeed = 0;
            let stationZ = 18;       // Дистанция до станции
            
            // Флаги управления крена (от кнопок)
            let manualRollLeft = false;
            let manualRollRight = false;
            const ROLL_SPEED = 0.045;
            
            // Переменные гироскопа
            let gyroActive = false;
            let targetPitch = 0;
            let currentPitchVelocity = 0;
            const PITCH_SENSITIVITY = 0.008;
            const PITCH_DAMPING = 0.94;
            
            // Элементы UI
            const enableBtn = document.getElementById('enableGyroBtn');
            const gyroStatusDiv = document.getElementById('gyroStatus');
            const rollLeftBtn = document.getElementById('roll-left');
            const rollRightBtn = document.getElementById('roll-right');
            
            // ======================== 7. ФУНКЦИИ ПОВОРОТА И ПРОЕКЦИИ ========================
            function rotateX(v, angle) {
                let cos = Math.cos(angle), sin = Math.sin(angle);
                return { x: v.x, y: v.y * cos - v.z * sin, z: v.y * sin + v.z * cos };
            }
            function rotateZ(v, angle) {
                let cos = Math.cos(angle), sin = Math.sin(angle);
                return { x: v.x * cos - v.y * sin, y: v.x * sin + v.y * cos, z: v.z };
            }
            function project(v, w, h) {
                let scale = 320, dist = 5;
                let z = v.z + dist;
                if (z <= 0.1) return { x: w/2, y: h/2, clipped: true };
                return { x: (v.x * scale) / z + w/2, y: (v.y * scale) / z + h/2, clipped: false };
            }
            
            // ======================== 8. ГИРОСКОП (ИСПРАВЛЕННЫЙ) ========================
            function handleOrientation(event) {
                if (!gyroActive) return;
                // beta: наклон вперед/назад (-90..90). Преобразуем в -1..1
                let beta = (event.beta || 0);
                if (beta > 45) beta = 45;
                if (beta < -45) beta = -45;
                targetPitch = (beta / 45) * PITCH_SENSITIVITY;
            }
            
            function requestGyroAccess() {
                gyroStatusDiv.innerText = "🔄 Запрашиваем разрешение...";
                gyroStatusDiv.style.color = "yellow";
                
                const handleSuccess = () => {
                    window.addEventListener('deviceorientation', handleOrientation);
                    gyroActive = true;
                    gyroStatusDiv.innerText = "✅ ГИРОСКОП АКТИВЕН (Наклоняй телефон)";
                    gyroStatusDiv.style.color = "#0f0";
                    if(enableBtn) enableBtn.style.display = 'none';
                };
                
                const handleError = (e) => {
                    console.warn("Gyro error:", e);
                    gyroStatusDiv.innerText = "⚠️ Гироскоп не доступен (Используй кнопки справа)";
                    gyroStatusDiv.style.color = "orange";
                    if(enableBtn) enableBtn.style.display = 'none';
                    gyroActive = false;
                };
                
                // Логика для Android / Desktop Chrome (без requestPermission)
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission !== 'function') {
                    // Android и большинство PC: достаточно просто начать слушать
                    window.addEventListener('deviceorientation', handleOrientation);
                    gyroActive = true;
                    gyroStatusDiv.innerText = "✅ ГИРОСКОП АКТИВЕН (Наклоняй телефон)";
                    if(enableBtn) enableBtn.style.display = 'none';
                    return;
                }
                
                // Логика для iOS (нужен тап по кнопке)
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                                gyroActive = true;
                                gyroStatusDiv.innerText = "✅ ГИРОСКОП АКТИВЕН (Наклоняй телефон)";
                                if(enableBtn) enableBtn.style.display = 'none';
                            } else {
                                handleError(new Error("Permission denied"));
                            }
                        })
                        .catch(handleError);
                } else {
                    handleError(new Error("DeviceOrientationEvent not supported"));
                }
            }
            
            if (enableBtn) {
                enableBtn.addEventListener('click', requestGyroAccess);
            }
            
            // Управление креном с кнопок (для подстраховки)
            rollLeftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); manualRollLeft = true; });
            rollLeftBtn.addEventListener('touchend', () => { manualRollLeft = false; });
            rollLeftBtn.addEventListener('mousedown', () => { manualRollLeft = true; });
            rollLeftBtn.addEventListener('mouseup', () => { manualRollLeft = false; });
            
            rollRightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); manualRollRight = true; });
            rollRightBtn.addEventListener('touchend', () => { manualRollRight = false; });
            rollRightBtn.addEventListener('mousedown', () => { manualRollRight = true; });
            rollRightBtn.addEventListener('mouseup', () => { manualRollRight = false; });
            
            // Слайдер скорости (Левая часть экрана)
            let isSpeedSliding = false;
            canvas.addEventListener('touchstart', (e) => {
                if (e.touches[0].clientX < width / 2) {
                    isSpeedSliding = true;
                    updateSpeed(e.touches[0].clientY);
                    e.preventDefault();
                }
            });
            canvas.addEventListener('touchmove', (e) => {
                if (isSpeedSliding) updateSpeed(e.touches[0].clientY);
                e.preventDefault();
            });
            canvas.addEventListener('touchend', () => { isSpeedSliding = false; });
            
            function updateSpeed(y) {
                let norm = 1 - (y / height);
                targetSpeed = Math.min(5.5, Math.max(0, norm * 5.5));
                document.getElementById('speed-value').innerText = targetSpeed.toFixed(1);
            }
            
            // ======================== 9. ОСНОВНОЙ ЦИКЛ ИГРЫ ========================
            function draw() {
                if (width !== window.innerWidth || height !== window.innerHeight) {
                    width = window.innerWidth; height = window.innerHeight;
                    canvas.width = width; canvas.height = height;
                }
                
                // 1. ФИЗИКА ДВИЖЕНИЯ
                // Плавная скорость
                speed += (targetSpeed - speed) * 0.08;
                stationZ -= speed * 0.045;
                if (stationZ < 2.5) stationZ = 2.5;
                if (stationZ > 35) stationZ = 35;
                
                // Обновление углов
                // Pitch (Гироскоп)
                if (gyroActive) {
                    currentPitchVelocity += (targetPitch - currentPitchVelocity) * 0.1;
                    pitchAngle += currentPitchVelocity;
                } else {
                    currentPitchVelocity *= PITCH_DAMPING;
                    pitchAngle += currentPitchVelocity;
                }
                // Roll (Крен от кнопок)
                if (manualRollLeft) rollAngle -= ROLL_SPEED;
                if (manualRollRight) rollAngle += ROLL_SPEED;
                // Естественное затухание крена
                rollAngle *= 0.98;
                
                // Движение астероидов
                asteroids.forEach(ast => {
                    ast.z -= speed * 0.045;
                    if (ast.z < -3) {
                        ast.z = 25 + Math.random() * 15;
                        ast.x = (Math.random() - 0.5) * 22;
                        ast.y = (Math.random() - 0.5) * 14;
                    }
                });
                
                // 2. ОТРИСОВКА
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, width, height);
                
                // Звезды
                ctx.fillStyle = 'white';
                stars.forEach(s => {
                    let z = s.z + (1 + speed * 2);
                    if (z > 600) z = -600;
                    s.z = z;
                    let x2d = (s.x * 280) / (z + 450) + width/2;
                    let y2d = (s.y * 280) / (z + 450) + height/2;
                    if (x2d > 0 && x2d < width) ctx.fillRect(x2d, y2d, s.size, s.size);
                });
                
                // Трансформация мира
                const transform = (v) => rotateX(rotateZ(v, rollAngle), pitchAngle);
                
                // Корабль
                let shipProj = vertices.map(v => project(transform(v), width, height));
                ctx.strokeStyle = '#0f0'; ctx.lineWidth = 2.5;
                edges.forEach(edge => {
                    let p1 = shipProj[edge[0]], p2 = shipProj[edge[1]];
                    if(p1 && p2 && !p1.clipped && !p2.clipped) {
                        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                });
                // Двигатели
                if(shipProj[6] && shipProj[7]) {
                    ctx.fillStyle = `hsl(0, 100%, ${50 + Math.sin(Date.now() * 0.02) * 30}%)`;
                    ctx.beginPath(); ctx.arc(shipProj[6].x, shipProj[6].y, 5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(shipProj[7].x, shipProj[7].y, 5, 0, Math.PI*2); ctx.fill();
                }
                
                // Станция
                let stationWorld = stationVertices.map(v => ({ x: v.x, y: v.y, z: v.z + stationZ }));
                let stationProj = stationWorld.map(v => project(transform(v), width, height));
                ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 2;
                stationEdges.forEach(edge => {
                    let p1 = stationProj[edge[0]], p2 = stationProj[edge[1]];
                    if(p1 && p2 && !p1.clipped && !p2.clipped) {
                        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                });
                // Маяк станции
                if(stationProj[0]) {
                    ctx.fillStyle = `hsl(0, 100%, ${50 + Math.sin(Date.now() * 0.03) * 30}%)`;
                    ctx.beginPath(); ctx.arc(stationProj[0].x, stationProj[0].y, 6, 0, Math.PI*2); ctx.fill();
                }
                
                // Астероиды
                asteroids.forEach(ast => {
                    let astWorld = ast.vertices.map(v => ({ x: v.x + ast.x, y: v.y + ast.y, z: v.z + ast.z }));
                    let astProj = astWorld.map(v => project(transform(v), width, height));
                    ctx.strokeStyle = '#aa8866'; ctx.lineWidth = 1.5;
                    ast.edges.forEach(edge => {
                        let p1 = astProj[edge[0]], p2 = astProj[edge[1]];
                        if(p1 && p2 && !p1.clipped && !p2.clipped) {
                            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                        }
                    });
                });
                
                // Прицел (центр)
                let cx = width/2, cy = height/2;
                ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(cx-15, cy); ctx.lineTo(cx-5, cy); ctx.moveTo(cx+15, cy); ctx.lineTo(cx+5, cy);
                ctx.moveTo(cx, cy-15); ctx.lineTo(cx, cy-5); ctx.moveTo(cx, cy+15); ctx.lineTo(cx, cy+5); ctx.stroke();
                
                // Индикаторы
                let dist = Math.sqrt(stationZ * stationZ);
                document.getElementById('distance-value').innerText = dist.toFixed(1);
                ctx.fillStyle = '#0f0'; ctx.font = '12px monospace';
                ctx.fillText(`Скорость: ${speed.toFixed(1)}`, 20, 50);
                
                requestAnimationFrame(draw);
            }
            
            // Запуск игры
            canvas.width = width; canvas.height = height;
            draw();
            window.addEventListener('resize', () => {
                width = window.innerWidth; height = window.innerHeight;
                canvas.width = width; canvas.height = height;
            });
        })();
    </script>
</body>
</html>
