<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cobra MK3 - Докировка</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        #ui {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            pointer-events: none;
            color: #0f0;
            font-size: 12px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            text-shadow: 0 0 2px black;
        }
        .controls-panel {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
            pointer-events: auto;
        }
        .ctrl-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #0f0;
            color: #0f0;
            font-size: 24px;
            font-weight: bold;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            text-align: center;
            line-height: 66px;
            cursor: pointer;
            user-select: none;
            backdrop-filter: blur(4px);
        }
        .ctrl-btn:active {
            background: #0f0;
            color: black;
            transform: scale(0.95);
        }
        .gyro-activator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f0;
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-family: monospace;
            font-size: 18px;
            z-index: 30;
            cursor: pointer;
            pointer-events: auto;
        }
        .gyro-status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 8px;
            color: #ffaa00;
            font-size: 11px;
            z-index: 30;
            font-family: monospace;
            pointer-events: none;
        }
        .speed-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 10px;
            color: #0f0;
            pointer-events: none;
            z-index: 30;
        }
        .distance-bar-container {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 150px;
            height: 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #0f0;
            border-radius: 6px;
            z-index: 30;
            overflow: hidden;
            pointer-events: none;
        }
        .distance-bar {
            height: 100%;
            width: 0%;
            background: #0f0;
            transition: width 0.1s linear;
        }
        .distance-text {
            position: fixed;
            top: 65px;
            right: 180px;
            color: #0f0;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 30;
            text-shadow: 0 0 2px black;
        }
        @media (max-width: 600px) {
            .ctrl-btn { width: 55px; height: 55px; line-height: 51px; font-size: 20px; }
            .controls-panel { right: 10px; gap: 15px; }
            .distance-bar-container { width: 100px; right: 10px; }
            .distance-text { right: 120px; font-size: 9px; top: 70px; }
        }
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.2s;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>⚡ СКОРОСТЬ: <span id="speed-value">0</span></div>
        <div>🎯 СТАНЦИЯ: <span id="distance-value">--</span></div>
    </div>
    <div class="distance-text">ДИСТАНЦИЯ</div>
    <div class="distance-bar-container">
        <div class="distance-bar" id="distanceBar"></div>
    </div>

    <div class="controls-panel">
        <div class="ctrl-btn" id="roll-left">◀</div>
        <div class="ctrl-btn" id="roll-right">▶</div>
    </div>

    <button id="enableGyroBtn" class="gyro-activator">🎮 Активировать гироскоп</button>
    <div id="gyroStatus" class="gyro-status">⏳ Гироскоп: Ожидание активации</div>
    <div class="speed-hint">⬅️ Слайдер скорости (левый нижний угол) | ПК: W/S A/D , .</div>
    
    <div id="flashOverlay" class="flash-overlay"></div>

    <script>
        (function() {
            // ======================== 1. ЭКРАН ========================
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            document.body.appendChild(canvas);
            
            let width = window.innerWidth;
            let height = window.innerHeight;
            
            // ======================== 2. ЗВЕЗДЫ (РЕАЛИСТИЧНАЯ ФИЗИКА) ========================
            const stars = [];
            for (let i = 0; i < 400; i++) {
                // Распределяем звезды на разные глубины (zOffset)
                const depthFactor = Math.random(); // 0..1, дальше = ближе к 1
                stars.push({
                    x: (Math.random() - 0.5) * 2000,
                    y: (Math.random() - 0.5) * 2000,
                    z: (Math.random() - 0.5) * 800,
                    size: 0.8 + Math.random() * 1.5,
                    // Фактор дальности: чем дальше звезда (чем выше z), тем медленнее она движется
                    // Нормализуем z в диапазон 0-1 (дальние к 1)
                    parallaxFactor: Math.random() * 0.8 + 0.2 // 0.2 - 1.0, дальние двигаются медленно
                });
            }
            
            // ======================== 3. КОРАБЛЬ COBRA MK3 ========================
            const vertices = [
                { x: -0.5, y:  0.5, z:  1.0 }, { x:  0.5, y:  0.5, z:  1.0 }, { x:  0.0, y:  0.3, z:  1.2 },
                { x: -0.6, y:  0.2, z:  0.0 }, { x:  0.6, y:  0.2, z:  0.0 }, { x:  0.0, y: -0.2, z:  0.0 },
                { x: -0.4, y:  0.1, z: -0.8 }, { x:  0.4, y:  0.1, z: -0.8 }, { x:  0.0, y: -0.1, z: -0.9 }
            ];
            const edges = [
                [0,1], [0,2], [1,2], [0,3], [1,4], [3,4], [3,5], [4,5],
                [3,6], [4,7], [5,8], [6,7], [6,8], [7,8]
            ];
            
            // ======================== 4. СТАНЦИЯ ========================
            const stationVertices = [
                { x: -1.2, y: -1.2, z:  1.0 }, { x:  1.2, y: -1.2, z:  1.0 }, { x:  1.2, y:  1.2, z:  1.0 }, { x: -1.2, y:  1.2, z:  1.0 },
                { x: -1.2, y: -1.2, z: -1.0 }, { x:  1.2, y: -1.2, z: -1.0 }, { x:  1.2, y:  1.2, z: -1.0 }, { x: -1.2, y:  1.2, z: -1.0 },
                { x: -0.7, y:  0.3, z:  1.01 }, { x:  0.7, y:  0.3, z:  1.01 }, { x:  0.0, y:  0.3, z:  1.01 }, { x:  0.0, y: -0.7, z:  1.01 }
            ];
            const stationEdges = [
                [0,1],[1,2],[2,3],[3,0], [4,5],[5,6],[6,7],[7,4],
                [0,4],[1,5],[2,6],[3,7], [8,10],[9,10],[10,11]
            ];
            
            // ======================== 5. АСТЕРОИДЫ ========================
            class Asteroid {
                constructor() {
                    this.respawn();
                }
                respawn() {
                    this.x = (Math.random() - 0.5) * 24;
                    this.y = (Math.random() - 0.5) * 16;
                    this.z = 15 + Math.random() * 30;
                    this.size = 0.6 + Math.random() * 1.3;
                    this.vertices = [];
                    for (let i = 0; i < 14; i++) {
                        this.vertices.push({
                            x: (Math.random() - 0.5) * this.size * 1.4,
                            y: (Math.random() - 0.5) * this.size * 1.4,
                            z: (Math.random() - 0.5) * this.size * 1.4
                        });
                    }
                    this.edges = [];
                    for (let i = 0; i < this.vertices.length; i++) {
                        for (let j = i+1; j < this.vertices.length; j++) {
                            if (Math.random() < 0.25) this.edges.push([i, j]);
                        }
                    }
                }
            }
            let asteroids = [new Asteroid(), new Asteroid(), new Asteroid(), new Asteroid()];
            
            // ======================== 6. ФИЗИКА ========================
            let pitchAngle = 0;      // Тангаж
            let rollAngle = 0;       // Крен
            
            let pitchVelocity = 0;   // Скорость тангажа
            let rollVelocity = 0;    // Скорость крена
            
            let speed = 0;
            let targetSpeed = 0;
            let stationZ = 18;
            let docked = false;
            let flashColor = '';
            let flashOpacity = 0;
            
            // Параметры инерции
            const ANGULAR_ACCEL = 0.003;
            const ANGULAR_DAMP = 0.98;
            const MAX_VEL = 0.08;
            
            // Дублирующие кнопки и клавиатура
            let manualRollLeft = false;
            let manualRollRight = false;
            let manualPitchUp = false;
            let manualPitchDown = false;
            const MANUAL_ROLL_SPEED = 0.04;
            const MANUAL_PITCH_SPEED = 0.03;
            
            // Гироскоп
            let gyroActive = false;
            let targetPitchRate = 0;
            let targetRollRate = 0;
            const GYRO_SENSITIVITY = 0.006;
            
            // Элементы UI
            const enableBtn = document.getElementById('enableGyroBtn');
            const gyroStatusDiv = document.getElementById('gyroStatus');
            const rollLeftBtn = document.getElementById('roll-left');
            const rollRightBtn = document.getElementById('roll-right');
            const speedValueSpan = document.getElementById('speed-value');
            const distanceSpan = document.getElementById('distance-value');
            const distanceBar = document.getElementById('distanceBar');
            const flashOverlay = document.getElementById('flashOverlay');
            
            // ======================== 7. ФУНКЦИИ ПОВОРОТА ========================
            function rotateX(v, angle) {
                let cos = Math.cos(angle), sin = Math.sin(angle);
                return { x: v.x, y: v.y * cos - v.z * sin, z: v.y * sin + v.z * cos };
            }
            function rotateZ(v, angle) {
                let cos = Math.cos(angle), sin = Math.sin(angle);
                return { x: v.x * cos - v.y * sin, y: v.x * sin + v.y * cos, z: v.z };
            }
            function project(v, w, h) {
                let scale = 320, dist = 5;
                let z = v.z + dist;
                if (z <= 0.1) return { x: w/2, y: h/2, clipped: true };
                return { x: (v.x * scale) / z + w/2, y: (v.y * scale) / z + h/2, clipped: false };
            }
            
            // ======================== 8. ГИРОСКОП ========================
            function handleOrientation(event) {
                if (!gyroActive) return;
                
                let beta = event.beta || 0;
                let gamma = event.gamma || 0;
                
                beta = Math.min(45, Math.max(-45, beta)) / 45;
                gamma = Math.min(45, Math.max(-45, gamma)) / 45;
                
                targetPitchRate = beta * GYRO_SENSITIVITY;
                targetRollRate = gamma * GYRO_SENSITIVITY;
            }
            
            function requestGyroAccess() {
                gyroStatusDiv.innerText = "🔄 Запрашиваем разрешение...";
                gyroStatusDiv.style.color = "yellow";
                
                const handleSuccess = () => {
                    window.addEventListener('deviceorientation', handleOrientation);
                    gyroActive = true;
                    gyroStatusDiv.innerText = "✅ ГИРОСКОП АКТИВЕН (Наклоняй телефон)";
                    gyroStatusDiv.style.color = "#0f0";
                    if(enableBtn) enableBtn.style.display = 'none';
                };
                
                const handleError = (e) => {
                    gyroStatusDiv.innerText = "⚠️ Гироскоп не доступен (Используй кнопки/клавиатуру)";
                    gyroStatusDiv.style.color = "orange";
                    if(enableBtn) enableBtn.style.display = 'none';
                    gyroActive = false;
                };
                
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission !== 'function') {
                    window.addEventListener('deviceorientation', handleOrientation);
                    gyroActive = true;
                    gyroStatusDiv.innerText = "✅ ГИРОСКОП АКТИВЕН";
                    if(enableBtn) enableBtn.style.display = 'none';
                    return;
                }
                
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                                gyroActive = true;
                                gyroStatusDiv.innerText = "✅ ГИРОСКОП АКТИВЕН";
                                if(enableBtn) enableBtn.style.display = 'none';
                            } else {
                                handleError(new Error("Permission denied"));
                            }
                        })
                        .catch(handleError);
                } else {
                    handleError(new Error("Not supported"));
                }
            }
            
            if (enableBtn) {
                enableBtn.addEventListener('click', requestGyroAccess);
            }
            
            // ======================== 9. УПРАВЛЕНИЕ (КНОПКИ + КЛАВИАТУРА) ========================
            // Кнопки крена
            rollLeftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); manualRollLeft = true; });
            rollLeftBtn.addEventListener('touchend', () => { manualRollLeft = false; });
            rollLeftBtn.addEventListener('mousedown', () => { manualRollLeft = true; });
            rollLeftBtn.addEventListener('mouseup', () => { manualRollLeft = false; });
            
            rollRightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); manualRollRight = true; });
            rollRightBtn.addEventListener('touchend', () => { manualRollRight = false; });
            rollRightBtn.addEventListener('mousedown', () => { manualRollRight = true; });
            rollRightBtn.addEventListener('mouseup', () => { manualRollRight = false; });
            
            // Клавиатура (ПК)
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                // Тангаж: W / S
                if (key === 'w' || key === 'W') { manualPitchUp = true; e.preventDefault(); }
                if (key === 's' || key === 'S') { manualPitchDown = true; e.preventDefault(); }
                // Крен: A / D
                if (key === 'a' || key === 'A') { manualRollLeft = true; e.preventDefault(); }
                if (key === 'd' || key === 'D') { manualRollRight = true; e.preventDefault(); }
                // Скорость: , (запятая) и . (точка)
                if (key === ',') { targetSpeed = Math.max(0, targetSpeed - 0.3); e.preventDefault(); }
                if (key === '.') { targetSpeed = Math.min(5.5, targetSpeed + 0.3); e.preventDefault(); }
            });
            
            window.addEventListener('keyup', (e) => {
                const key = e.key;
                if (key === 'w' || key === 'W') { manualPitchUp = false; }
                if (key === 's' || key === 'S') { manualPitchDown = false; }
                if (key === 'a' || key === 'A') { manualRollLeft = false; }
                if (key === 'd' || key === 'D') { manualRollRight = false; }
            });
            
            // ======================== 10. СЛАЙДЕР СКОРОСТИ ========================
            let isSpeedSliding = false;
            
            canvas.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                const x = touch.clientX;
                const y = touch.clientY;
                if (x < width / 2 && y > height / 2) {
                    isSpeedSliding = true;
                    updateSpeed(touch.clientY);
                    e.preventDefault();
                }
            });
            
            canvas.addEventListener('touchmove', (e) => {
                if (isSpeedSliding) {
                    updateSpeed(e.touches[0].clientY);
                    e.preventDefault();
                }
            });
            
            canvas.addEventListener('touchend', () => { isSpeedSliding = false; });
            
            function updateSpeed(y) {
                let relativeY = Math.max(0, Math.min(1, (y - height/2) / (height/2)));
                let norm = 1 - relativeY;
                targetSpeed = Math.min(5.5, Math.max(0, norm * 5.5));
                if (speedValueSpan) speedValueSpan.innerText = targetSpeed.toFixed(1);
            }
            
            // ======================== 11. СТЫКОВКА ========================
            function checkDocking() {
                if (docked) return;
                const distance = Math.abs(stationZ);
                // Условия стыковки: дистанция меньше 1.5, скорость меньше 0.8, угол поворота корабля небольшой
                const isAligned = Math.abs(pitchAngle) < 0.3 && Math.abs(rollAngle) < 0.3;
                if (distance < 1.8 && speed < 0.8 && isAligned) {
                    // Успешная стыковка
                    docked = true;
                    flashColor = '#0f0';
                    flashOpacity = 1;
                    targetSpeed = 0;
                    speed = 0;
                    stationZ = 18; // Сброс позиции станции для следующей попытки
                    setTimeout(() => { docked = false; }, 2000);
                } else if (distance < 1.2 && speed >= 0.8) {
                    // Неудачная стыковка (удар)
                    flashColor = '#f00';
                    flashOpacity = 0.8;
                    // Отброс корабля назад
                    speed = -1.5;
                    targetSpeed = 0;
                    stationZ += 2.5;
                    setTimeout(() => { flashOpacity = 0; }, 300);
                }
            }
            
            // ======================== 12. ОСНОВНОЙ ЦИКЛ ========================
            function draw() {
                if (width !== window.innerWidth || height !== window.innerHeight) {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;
                }
                
                // === ФИЗИКА СКОРОСТИ ===
                if (!docked) {
                    speed += (targetSpeed - speed) * 0.08;
                    stationZ -= speed * 0.045;
                } else {
                    speed *= 0.95;
                }
                if (stationZ < 2.0) stationZ = 2.0;
                if (stationZ > 40) stationZ = 40;
                
                // === ФИЗИКА ВРАЩЕНИЯ (ГИРОСКОП + КЛАВИАТУРА/КНОПКИ) ===
                if (gyroActive) {
                    pitchVelocity += (targetPitchRate - pitchVelocity) * 0.1;
                    rollVelocity += (targetRollRate - rollVelocity) * 0.1;
                } else {
                    // Ручное управление с кнопок и клавиатуры
                    if (manualPitchUp) pitchVelocity -= MANUAL_PITCH_SPEED;
                    if (manualPitchDown) pitchVelocity += MANUAL_PITCH_SPEED;
                    if (manualRollLeft) rollVelocity -= MANUAL_ROLL_SPEED;
                    if (manualRollRight) rollVelocity += MANUAL_ROLL_SPEED;
                    pitchVelocity *= ANGULAR_DAMP;
                    rollVelocity *= ANGULAR_DAMP;
                }
                
                pitchVelocity = Math.min(MAX_VEL, Math.max(-MAX_VEL, pitchVelocity));
                rollVelocity = Math.min(MAX_VEL, Math.max(-MAX_VEL, rollVelocity));
                
                pitchAngle += pitchVelocity;
                rollAngle += rollVelocity;
                
                // === ДВИЖЕНИЕ АСТЕРОИДОВ ===
                asteroids.forEach(ast => {
                    ast.z -= speed * 0.045;
                    if (ast.z < -5) {
                        ast.respawn();
                    }
                });
                
                // === ПРОВЕРКА СТЫКОВКИ ===
                checkDocking();
                
                // === ЭФФЕКТ ВСПЫШКИ ===
                if (flashOpacity > 0) {
                    flashOverlay.style.backgroundColor = flashColor;
                    flashOverlay.style.opacity = flashOpacity;
                    flashOpacity -= 0.03;
                } else {
                    flashOverlay.style.opacity = 0;
                }
                
                // === ОТРИСОВКА ===
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, width, height);
                
                // Звезды (реалистичное движение: дальние почти не двигаются)
                ctx.fillStyle = 'white';
                stars.forEach(s => {
                    // Чем дальше звезда, тем меньше влияние скорости
                    let speedEffect = 1 + speed * s.parallaxFactor * 1.2;
                    let z = s.z + speedEffect;
                    if (z > 600) z = -600;
                    if (z < -600) z = 600;
                    s.z = z;
                    
                    let x2d = (s.x * 280) / (z + 450) + width/2;
                    let y2d = (s.y * 280) / (z + 450) + height/2;
                    if (x2d > -50 && x2d < width + 50 && y2d > -50 && y2d < height + 50) {
                        ctx.beginPath();
                        // Ближние звезды рисуем больше
                        const starSize = s.size * (1 + (1 - s.parallaxFactor) * 0.5);
                        ctx.arc(x2d, y2d, starSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                
                // Трансформация (сначала крен, потом тангаж)
                const transform = (v) => rotateX(rotateZ(v, rollAngle), pitchAngle);
                
                // Корабль
                let shipProj = vertices.map(v => project(transform(v), width, height));
                ctx.strokeStyle = '#0f0';
                ctx.lineWidth = 2.5;
                edges.forEach(edge => {
                    let p1 = shipProj[edge[0]], p2 = shipProj[edge[1]];
                    if(p1 && p2 && !p1.clipped && !p2.clipped) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                });
                
                // Двигатели
                if(shipProj[6] && shipProj[7]) {
                    ctx.fillStyle = `hsl(0, 100%, ${50 + Math.sin(Date.now() * 0.02) * 30}%)`;
                    ctx.beginPath();
                    ctx.arc(shipProj[6].x, shipProj[6].y, 5, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(shipProj[7].x, shipProj[7].y, 5, 0, Math.PI*2);
                    ctx.fill();
                }
                
                // Станция
                let stationWorld = stationVertices.map(v => ({ x: v.x, y: v.y, z: v.z + stationZ }));
                let stationProj = stationWorld.map(v => project(transform(v), width, height));
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 2;
                stationEdges.forEach(edge => {
                    let p1 = stationProj[edge[0]], p2 = stationProj[edge[1]];
                    if(p1 && p2 && !p1.clipped && !p2.clipped) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                });
                
                // Маяк станции
                if(stationProj[0]) {
                    ctx.fillStyle = `hsl(0, 100%, ${50 + Math.sin(Date.now() * 0.03) * 30}%)`;
                    ctx.beginPath();
                    ctx.arc(stationProj[0].x, stationProj[0].y, 6, 0, Math.PI*2);
                    ctx.fill();
                }
                
                // Астероиды
                asteroids.forEach(ast => {
                    let astWorld = ast.vertices.map(v => ({ x: v.x + ast.x, y: v.y + ast.y, z: v.z + ast.z }));
                    let astProj = astWorld.map(v => project(transform(v), width, height));
                    ctx.strokeStyle = '#aa8866';
                    ctx.lineWidth = 1.5;
                    ast.edges.forEach(edge => {
                        let p1 = astProj[edge[0]], p2 = astProj[edge[1]];
                        if(p1 && p2 && !p1.clipped && !p2.clipped) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    });
                });
                
                // Прицел (центр экрана)
                let cx = width/2, cy = height/2;
                ctx.strokeStyle = '#ff3333';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(cx-15, cy);
                ctx.lineTo(cx-5, cy);
                ctx.moveTo(cx+15, cy);
                ctx.lineTo(cx+5, cy);
                ctx.moveTo(cx, cy-15);
                ctx.lineTo(cx, cy-5);
                ctx.moveTo(cx, cy+15);
                ctx.lineTo(cx, cy+5);
                ctx.stroke();
                
                // Индикатор расстояния (полоска и цифры)
                let dist = Math.abs(stationZ);
                let maxDist = 20;
                let percent = Math.min(100, (dist / maxDist) * 100);
                if (distanceBar) distanceBar.style.width = (100 - percent) + '%';
                if (distanceSpan) distanceSpan.innerText = dist.toFixed(1);
                
                // Меняем цвет индикатора при приближении
                if (dist < 4) {
                    distanceBar.style.backgroundColor = '#ffaa00';
                } else {
                    distanceBar.style.backgroundColor = '#0f0';
                }
                
                // Обновляем отображение скорости на UI
                if (speedValueSpan && !isSpeedSliding) {
                    speedValueSpan.innerText = targetSpeed.toFixed(1);
                }
                
                requestAnimationFrame(draw);
            }
            
            // ЗАПУСК
            canvas.width = width;
            canvas.height = height;
            draw();
            
            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            });
        })();
    </script>
</body>
</html>
